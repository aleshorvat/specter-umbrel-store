version: "3.8"

services:
  app_proxy:
    image: getumbrel/app-proxy:v1
    networks: [app-network]
    environment:
      APP_PASSWORD: ${APP_PASSWORD}
      APP_HOST: specterhub:3000
      PROXY_AUTH_ADD: "false"

  specterhub:
    image: ghcr.io/aleshorvat/specterhub:latest
    restart: unless-stopped
    networks: [app-network]
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      DATABASE_PATH: /app/data/specterhub.db
      JWT_SECRET: ${APP_SEED}
      SSH_PASSWORD_ENCRYPTION_KEY: ${APP_SSH_PASSWORD_ENCRYPTION_KEY}
      ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${APP_PASSWORD}

networks:
  app-network:
    name: specter_specterhub-network
