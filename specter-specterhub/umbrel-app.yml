manifestVersion: 1.1
id: specter-specterhub
category: developer
name: SpecterHub
version: "1.2.0"
tagline: Windows kiosk monitoring dashboard
description: >-
  Web dashboard for remotely monitoring and managing Windows kiosks over SSH.
  Tracks CPU, memory, disk, temperatures, reboots, and Windows Updates.
  Provides screenshot capture and live health charts.
releaseNotes: >-
  • Edit Kiosk — each kiosk card on the dashboard now has an Edit button that opens the kiosk configuration in the same modal used for adding a new kiosk; SSH password is preserved unless changed
